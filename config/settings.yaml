# ============================================================================
# regime-trader — settings.yaml
# All configurable parameters, grouped by section, with defaults and comments.
# Override per-environment as needed. Secrets go in .env / credentials.yaml.
# ============================================================================

# ---------------------------------------------------------------------------
# broker — connection + tradable universe
# ---------------------------------------------------------------------------
broker:
  paper_trading: true               # true = Alpaca paper account, false = live
  symbols:                          # tradable universe
    # Paper-ready default: SINGLE symbol. The backtester is a single-asset
    # allocation sleeve (trades the first symbol), and the multi-asset risk caps
    # (correlation/sector/concurrent) are unvalidated + correlation is inert
    # live without price_history (audit M4/M5). Validate multi-asset before
    # re-enabling the wider universe below.
    - SPY
    # - QQQ
    # - AAPL
    # - MSFT
    # - AMZN
    # - GOOGL
    # - NVDA
    # - META
    # - TSLA
    # - AMD
  timeframe: 1Day                   # LOCKED daily (M3): HMM + vol regimes + breakers
                                    #   are all daily-calibrated. Do NOT switch to
                                    #   intraday without re-validating the whole stack.
  max_reconnects: 10                # S-2: stream reconnect attempts before giving up
  max_bar_gap_sec: 300              # S-2: watchdog flags a stale feed after this silence (market open)

# ---------------------------------------------------------------------------
# cross_sectional — vía C book (return predictor = momentum rank, HMM = risk overlay)
#   The non-falsified path: a CROSS-SECTIONAL signal picks which S&P 500 names
#   outperform (the alpha); the HMM scales total gross exposure by vol regime
#   (the risk overlay). v1 = rules-based momentum (no training); ML predictor is a
#   gated v2 needing paid point-in-time data. Run `main.py --rebalance` (dry-run).
#   Knobs are FIXED, not swept (sweeping = the overfit trap). Real money BLOCKED
#   until the pre-registered gate passes (docs/analysis/2026-06-04-cross-sectional-prereg.md).
# ---------------------------------------------------------------------------
cross_sectional:
  proxy: SPY                        # symbol the HMM reads for the market vol regime
  lookback: 252                     # momentum window (≈12 months)
  skip: 21                          # bars skipped at the recent end (≈1 month; 12-1)
  top_fraction: 0.10                # hold the top decile by momentum
  max_concurrent: 50                # max names held (≈top decile of ~500)
  risk_on_gross: 1.0                # gross exposure in the low-vol regime (overlay=hmm)
  risk_off_gross: 0.5               # gross exposure in the high-vol regime (overlay=hmm)
  # DEPLOYED book risk overlay (Pablo, 2026-06-05): raw momentum alpha + crash_only overlay.
  # Goal = raise Sharpe WITHOUT the drawdown. crash_only (Daniel-Moskowitz dynamic) stays
  # FULL in low/mid vol and de-risks ONLY in the top (panic) tier → directional eval N=200:
  # Sharpe 0.93 (ties the no-overlay max) but maxDD -30% vs -40% (none); beats the hmm
  # overlay on Sharpe (0.87) AND return (475%->623%). inverse-vol weighting did NOT help
  # (Sharpe 0.79) and combining overlays de-risks too much, so neither is used.
  # Still attentive daily: the regime/vol_rank is recomputed every weekday.
  # See docs/analysis/2026-06-05-deployed-book-prereg.md. Change = this one line.
  overlay: crash_only               # none | hmm | hmm_prob | crash_only | vol_target | both
                                    #   hmm_prob = hmm fed with the POSTERIOR-WEIGHTED vol rank
                                    #   (core/meta_overlay.py): continuous de-risk, no argmax cliff.
                                    #   Not deployed — eval/challenger only until directionally compared.
  weighting: equal                  # equal | inv_vol (inv_vol underperformed; kept off)
  target_vol: 0.12                  # constant annualized vol target (vol_target/both)
  vol_window: 126                   # trailing bars for the book's realized-vol estimate (~6mo)
  gross_cap: 1.0                    # max gross after vol-targeting (1.0 = no leverage)
  gross_floor: 0.0                  # min gross after vol-targeting
  # Macro-event risk overlay (risk timing, NOT alpha): in the N days before a scheduled
  # high-vol US event (FOMC/payrolls, core/macro_calendar.py), scale the book's gross by
  # `event_derisk`. 0 or 1.0 = OFF (default). e.g. 0.5 = halve exposure into the event.
  # Opt-in + forward-test only — it does not predict the event outcome.
  event_derisk: 0.0                 # 0/1.0 = off; <1.0 = de-risk factor in the event window
  event_window_days: 2              # days before an event to de-risk
  max_sector_fraction: 0.30         # max share of the book in any one GICS sector
                                    #   (lets a hot sector lead — e.g. semis — but caps
                                    #   it; the rest fills with next-best momentum elsewhere)

# ---------------------------------------------------------------------------
# challenger — PARALLEL book (residual momentum + vol-target overlay), GATED
#   Evidence-backed alternative to the frozen baseline above (Blitz/Chaves iMOM +
#   Daniel-Moskowitz/Barroso vol-targeting). Runs as a SEPARATE paper book leaving the
#   baseline untouched (clean control). Knobs FROZEN in
#   docs/analysis/2026-06-05-idio-momentum-challenger-prereg.md — no sweep. Dry-run via
#   `main.py --rebalance --challenger`. Directional backtest: run_challenger_eval.py.
#   Real money BLOCKED until the challenger gate passes (≥12mo forward paper).
# ---------------------------------------------------------------------------
challenger:
  enabled: false                    # off by default; --challenger flag activates the path
  overlay: vol_target               # none | hmm | vol_target | both (V1 = vol_target)
  est_window: 504                   # estimation window for the market-model beta/alpha (~24mo)
  target_vol: 0.12                  # constant annualized vol target (vol_target/both overlay)
  vol_window: 126                   # trailing bars for the book's realized-vol estimate (~6mo)
  gross_cap: 1.0                    # max gross after vol-targeting (1.0 = no leverage)
  gross_floor: 0.0                  # min gross after vol-targeting

# ---------------------------------------------------------------------------
# quality — EDGAR quality(+momentum) sleeve (T2.1; --quality flag, own snapshot,
#   ALWAYS dry-run + synthetic NAV until T5.4 2nd paper account). Frozen prereg:
#   docs/analysis/2026-06-13-quality-edgar-prereg.md.
# ---------------------------------------------------------------------------
quality:
  enabled: true                     # DEPLOYED 2026-06-13 (paper, dry-run); --quality flag drives the path
  combine: quality_momentum         # quality | quality_momentum (variant B = combined)
  overlay: vol_target               # none | hmm | vol_target | both (vol_target = prereg)
  target_vol: 0.12                  # constant annualized vol target
  vol_window: 126                   # trailing bars for the book's realized-vol estimate (~6mo)
  gross_cap: 1.0                    # max gross after vol-targeting (1.0 = no leverage)
  gross_floor: 0.0                  # min gross after vol-targeting

# ---------------------------------------------------------------------------
# drift — out-of-cycle retrain trigger (T3.3). Stages a CHALLENGER model version
#   for HUMAN promotion (no auto-promote — coherent with T0.4 pin-champion).
# ---------------------------------------------------------------------------
drift:
  psi_threshold: 0.30               # max-feature PSI (recent vs prior window) above noise floor (~0.21)
  entropy_threshold: 0.90           # normalized posterior entropy above which the model is uncertain
  window: 126                       # bars per PSI comparison window (~6 months)

# ---------------------------------------------------------------------------
# meta_labeling — triple-barrier labeling accumulation (T3.1). Builds the training
#   set during the gates; the secondary sizing model is fit later (>=200 labels) on
#   its own prereg. Labeling only — no model, no orders.
# ---------------------------------------------------------------------------
meta_labeling:
  pt: 0.10                          # profit-take barrier (+10%)
  sl: 0.10                          # stop-loss barrier (-10%)
  max_hold: 21                      # vertical/time barrier (~1 month of bars)

# ---------------------------------------------------------------------------
# hmm — Hidden Markov Model regime detection
# ---------------------------------------------------------------------------
hmm:
  n_candidates: [3, 4, 5]           # candidate state counts (labels defined 3..7); BIC selects
  n_init: 10                        # random restarts per candidate (best log-likelihood kept)
  covariance_type: full             # full | diag | tied | spherical
  min_covar: 0.001                  # covariance floor (full-cov regularization)
  covars_prior: 0.01                # inverse-Wishart prior weight (full-cov regularization)
  n_iter: 100                       # max EM iterations per fit
  min_train_bars: 504               # min USABLE bars after feature warmup (~2y daily)
  stability_bars: 3                 # consecutive bars in new regime before switch confirmed
  flicker_window: 20                # lookback window for flicker detection
  flicker_threshold: 4              # max regime changes in window before flagged unstable
  min_confidence: 0.55              # min posterior prob to act on a regime label
  max_age_days: 7                   # legacy refit-age rule; since the T0.4 pin-champion amendment
                                    #   it only paces the dual-log shadow refit (no model swap)
  auto_retrain: false               # A-1: in-loop auto-retrain+propagate (now gated by A-4 below;
                                    #   pin-champion T0.4: --run-once loads the registry champion)
  challenger_tol: 0.0               # A-4: promote a refit only if its holdout log-likelihood is
                                    #   >= champion's minus this tolerance (0 = must not regress)
  dual_log_refit: true              # T0.4 amendment: while the old age rule would have refit, fit a
                                    #   throwaway shadow + log agreement to logs/shadow_refit.csv
                                    #   (never swaps models). Review after 2 weeks, then flip off.

# ---------------------------------------------------------------------------
# strategy — volatility-regime-based allocation
# ---------------------------------------------------------------------------
strategy:
  low_vol_allocation: 0.95          # equity exposure in low-vol regime
  mid_vol_allocation_trend: 0.95    # mid-vol regime, trend present (price>EMA50)
  mid_vol_allocation_no_trend: 0.60 # mid-vol regime, trend broken (price<EMA50)
  high_vol_allocation: 0.60         # equity exposure in high-vol regime (LONG, never short)
  low_vol_leverage: 1.25            # leverage applied in low-vol regime
  rebalance_threshold: 0.10         # drift (frac) from target before rebalance triggers
  min_confidence: 0.55              # below this regime prob -> uncertainty mode
  uncertainty_size_mult: 0.50       # size multiplier in uncertainty mode (also forces 1.0x lev)
  ema_period: 50                    # trend filter EMA period
  atr_period: 14                    # ATR period for stops
  atr_mult_low: 3.0                 # low-vol stop: price - 3*ATR floor
  ema_stop_atr_low: 0.5             # low-vol stop: EMA50 - 0.5*ATR
  ema_stop_atr_mid: 0.5             # mid-vol stop: EMA50 - 0.5*ATR
  ema_stop_atr_high: 1.0            # high-vol stop: EMA50 - 1.0*ATR (wider)

# ---------------------------------------------------------------------------
# risk — position sizing, leverage caps, drawdown circuit breakers
# ---------------------------------------------------------------------------
risk:
  max_risk_per_trade: 0.01          # frac of equity risked per trade (1%)
  max_leverage: 1.25                # gross-leverage ceiling, reachable (H4)
  max_single_position: 0.15         # max weight of any single symbol
  max_concurrent: 5                 # max simultaneous open positions
  max_daily_trades: 20              # daily order cap (overtrading guard)
  daily_dd_reduce: 0.02             # daily drawdown -> reduce sizing (2%)
  daily_dd_halt: 0.03               # daily drawdown -> halt trading (3%)
  weekly_dd_reduce: 0.05            # weekly drawdown -> reduce sizing (5%)
  weekly_dd_halt: 0.07              # weekly drawdown -> halt trading (7%)
  max_dd_from_peak: 0.10            # max drawdown from equity peak before full halt (10%)
  # --- position-level + order validation (Phase 5) ---
  max_sector_exposure: 0.30         # max gross exposure in one sector (needs sector_map)
  corr_reduce: 0.70                 # 60d correlation above this -> halve size
  corr_reject: 0.85                 # correlation above this -> reject trade
  corr_window: 60                   # rolling correlation lookback (trading days)
  max_spread_pct: 0.005             # reject if bid-ask spread > 0.5%
  duplicate_window_sec: 60          # block same symbol+direction within N seconds
  min_position_usd: 100             # reject positions smaller than this notional
  overnight_gap_mult: 3.0           # overnight stop assumed to gap through 3x
  overnight_gap_budget: 0.02        # overnight 3x-gap loss capped at 2% of equity
  reduce_size_mult: 0.50            # size multiplier when a soft breaker is active
  lock_file: null                   # peak-DD halt lock path (null = disabled; live sets a path)
  peak_reentry_calm_bars: 0         # bars of calm regime (vol_rank<0.67) before the peak-DD
                                    #   halt RELEASES (0 = legacy; backtester-only). Tuned on
                                    #   SPY, validated on held-out ETFs (see docs/superpowers).

# ---------------------------------------------------------------------------
# backtest — walk-forward allocation backtester
# ---------------------------------------------------------------------------
backtest:
  slippage_pct: 0.0005              # base slippage per unit turnover (5 bps flat floor)
  slippage_vol_coeff: 0.0           # R-1: extra slippage per unit ATR% (0=flat/legacy; try ~0.5 for vol-realistic backtests)
  initial_capital: 100000           # starting equity (USD)
  train_window: 504                 # in-sample bars per fold (~2y); must be >= hmm.min_train_bars (252 cannot train the HMM)
  test_window: 126                  # out-of-sample bars per fold (~6mo)
  step_size: 126                    # walk-forward step between folds
  risk_free_rate: 0.045             # annual risk-free rate for Sharpe/Sortino (4.5%)

# ---------------------------------------------------------------------------
# options_hedge — tail-risk put-spread overlay (pre-registered v1, ships OFF)
#   Risk action keyed to the HMM transition hazard (core/meta_overlay.py): when
#   P(high-vol tier tomorrow) holds >= trigger_hazard for trigger_days closes and
#   the book is still exposed, buy a defined-risk SPY put debit spread under a
#   hard premium budget. NOT alpha — capped-cost crash insurance. Knobs frozen in
#   docs/analysis/2026-06-11-meta-overlay-triage.md §3 (no sweep). Orders are
#   double-gated: enabled AND allow_orders AND --execute. Paper account only.
# ---------------------------------------------------------------------------
options_hedge:
  # ACTIVATED 2026-06-12 (Pablo) — paper account verified options level 3 (multi-leg
  # OK) + end-to-end dry-run smoke against the real SPY chain passed. The nightly
  # rebalance plist runs --execute, so a triggered hedge SUBMITS on the paper book.
  # AMENDMENT (pre-activation, before any track record): budget_quarter_bp 25->50.
  # The 25bp cap ($245 on the $98k account) could not afford ONE spread (real smoke
  # debit $466.5) -> the overlay could never act. 50bp = exactly 1 structure per
  # quarter at current prices; the 100bp/year cap still binds at ~2 structures.
  # See docs/analysis/2026-06-12-hedge-activation.md.
  enabled: true                     # master switch (false = the check never runs)
  allow_orders: true                # false = plan/log only even with --execute
  trigger_hazard: 0.35              # open when hazard >= this ...
  trigger_days: 2                   # ... for this many consecutive closes
  release_hazard: 0.20              # close when hazard < this ...
  release_days: 5                   # ... for this many consecutive closes
  min_book_gross: 0.6               # only hedge a book that is still exposed
  long_otm: 0.04                    # long put ~4% OTM
  short_otm: 0.10                   # short put ~10% OTM
  dte_min: 30                       # expiry window (days)
  dte_max: 60
  dte_target: 45
  budget_quarter_bp: 50             # net premium cap per quarter (bp of equity)
  budget_year_bp: 100               # net premium cap per rolling year (bp of equity)
  max_structures: 1                 # one live hedge at a time

# ---------------------------------------------------------------------------
# risk_monitor — intraday crash mitigation (main.py --risk-check, every 15 min)
#   RISK-ONLY ladder on the account's intraday return vs prior close:
#   alert -> derisk (sell 1-derisk_scale of each name) -> flatten (liquidate).
#   Monotonic within a session (state file latch); next daily rebalance resets.
#   allow_orders=false → observe+alert only. Turning it ON mid-gate changes the
#   pre-registered strategy: do it only with a documented gate amendment.
# ---------------------------------------------------------------------------
risk_monitor:
  alert_dd: 0.02                    # intraday DD -> WARNING alert
  derisk_dd: 0.04                   # intraday DD -> sell down to derisk_scale
  flatten_dd: 0.08                  # intraday DD -> emergency liquidation
  derisk_scale: 0.5                 # fraction of each position kept after derisk
  allow_orders: false               # false = observe mode (orders need --execute AND this)

# ---------------------------------------------------------------------------
# monitoring — dashboard + alerts
# ---------------------------------------------------------------------------
monitoring:
  dashboard_refresh_seconds: 5      # terminal dashboard refresh interval
  rate_limit_minutes: 15            # min minutes between repeated alerts of same type
  telegram_enabled: true            # T0.5: push WARNING+ alerts via the AIOS gateway bot;
                                    #   credentials from .env (TELEGRAM_BOT_TOKEN/TELEGRAM_CHAT_ID)
  telegram_min_severity: warning    # info | warning | critical
  heartbeat_max_bdays: 2            # T0.5: CRITICAL when track_record.csv is older than this
                                    #   (business days; checked by --risk-check, once/day alert)
