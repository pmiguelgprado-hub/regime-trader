# AIOS-style theme, black + BLUE (Pablo 2026-06-12: "negro+azul", overriding the
# cockpit's violet). Primary = the cockpit's cyan-blue accent #47bfff; charts
# keep their own semantic colors (teal/red candles, pink for drawdown/alerts).
# (Supersedes the earlier "stock dark, match the video" choice — the reference
# is the AIOS look, per docs/analysis/2026-06-11-meta-overlay-triage.md.)
[theme]
base = "dark"
primaryColor = "#47bfff"
backgroundColor = "#000000"
secondaryBackgroundColor = "#0a1420"
textColor = "#e6e6e6"

[server]
headless = true
